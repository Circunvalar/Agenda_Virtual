<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>Registro</title>

    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
    >

    <link
            rel="stylesheet"
            th:href="@{/css/auth/auth.css}"
    >

</head>

<body>

<div class="theme-toggle">

    <button
            class="theme-btn"
            onclick="toggleTheme()"
    >
        🌙
    </button>

</div>

<div class="auth-wrapper">

    <form
            class="auth-card"
            method="post"
            action="/register"
    >

        <div class="logo">
            ✨
        </div>

        <h1 class="auth-title">
            Crear Cuenta
        </h1>

        <p class="auth-subtitle">
            Comienza a gestionar tus eventos,
            tareas y contactos desde un solo lugar.
        </p>

        <div class="input-group">

            <label for="nombre" class="input-label">
                Nombre completo
            </label>

            <input
                    id="nombre"
                    type="text"
                    name="nombre"
                    placeholder="Tu nombre completo"
                    class="input-style"
                    minlength="3"
                    required
            >

            <div id="nombreError" class="input-message" aria-live="polite"></div>

        </div>

        <div class="input-group">

            <label for="email" class="input-label">
                Correo electrónico
            </label>

            <input
                    id="email"
                    type="email"
                    name="email"
                    placeholder="correo@ejemplo.com"
                    class="input-style"
                    required
            >

            <div id="emailError" class="input-message" aria-live="polite"></div>

        </div>

        <div class="input-group">

            <label for="telefono" class="input-label">
                Número telefónico
            </label>

            <input
                    id="telefono"
                    type="tel"
                    name="telefono"
                    placeholder="3001234567"
                    class="input-style"
                    inputmode="numeric"
                    pattern="\d{10}"
                    maxlength="10"
                    minlength="10"
                    title="Número celular colombiano (10 dígitos, solo números)"
                    required
            >

            <div id="telefonoError" class="input-message" aria-live="polite"></div>

        </div>

        <div class="input-group">

            <label for="username" class="input-label">
                Usuario
            </label>

            <input
                    id="username"
                    type="text"
                    name="username"
                    placeholder="Nombre de usuario"
                    class="input-style"
                    minlength="3"
                    required
            >

            <div id="usernameError" class="input-message" aria-live="polite"></div>

        </div>

        <div class="input-group">

            <label for="password" class="input-label">
                Contraseña
            </label>

            <input
                    id="password"
                    type="password"
                    name="password"
                    placeholder="Crea una contraseña"
                    class="input-style"
                    minlength="8"
                    pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*\W).{8,}"
                    title="La contraseña debe tener al menos 8 caracteres, incluyendo mayúscula, minúscula, número y un caracter especial."
                    required
            >

            <button type="button" id="togglePassword" aria-label="Mostrar contraseña" style="margin-top:10px;display:inline-block;padding:8px 10px;border-radius:8px;border:1px solid rgba(0,0,0,0.06);background:transparent;color:var(--text-muted);cursor:pointer;">Mostrar</button>

            <div id="passwordError" class="input-message" aria-live="polite"></div>

            <div id="passwordHelp" class="input-help" aria-live="polite">
                <small>
                    Requisitos: mínimo 8 caracteres, al menos una letra mayúscula, una minúscula, un número y un carácter especial.
                </small>
                <div style="height:6px;margin-top:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;">
                    <div id="passwordStrength" style="height:6px;width:0%;background:#e11d48;transition:width .2s ease;"></div>
                </div>
            </div>

        </div>

        <div class="input-group">

            <label for="passwordConfirm" class="input-label">Repetir contraseña</label>

            <input
                    id="passwordConfirm"
                    type="password"
                    name="passwordConfirm"
                    placeholder="Reescribe la contraseña"
                    class="input-style"
                    minlength="8"
                    required
            >

            <div id="passwordConfirmError" class="input-message" aria-live="polite"></div>

        </div>

        <div id="formErrors" style="display:none;color:#fecaca;margin-bottom:8px;font-size:0.95rem;"></div>

        <button
                id="submitBtn"
                type="submit"
                class="submit-btn"
        >
            Registrarse
        </button>

        <div class="auth-footer">

            ¿Ya tienes cuenta?

            <a href="/login">
                Iniciar sesión
            </a>

        </div>

    </form>

</div>

<script th:src="@{/js/auth/auth.js}"></script>
<script th:src="@{/js/auth/register-validate.js}"></script>

</body>
</html>
