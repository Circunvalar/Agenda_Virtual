<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>Registro</title>

    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
    >

    <link
            rel="stylesheet"
            th:href="@{/css/auth/auth.css}"
    >

</head>

<body>

<div class="theme-toggle">

    <button
            class="theme-btn"
            onclick="toggleTheme()"
    >
        🌙
    </button>

</div>

<div class="auth-wrapper">

    <form
            class="auth-card"
            method="post"
            action="/register"
    >

        <div class="logo">
            ✨
        </div>

        <h1 class="auth-title">
            Crear Cuenta
        </h1>

        <p class="auth-subtitle">
            Comienza a gestionar tus eventos,
            tareas y contactos desde un solo lugar.
        </p>

        <div class="input-group">

            <label class="input-label">
                Nombre completo
            </label>

            <input
                    type="text"
                    name="nombre"
                    placeholder="Tu nombre completo"
                    class="input-style"
                    required
            >

        </div>

        <div class="input-group">

            <label class="input-label">
                Correo electrónico
            </label>

            <input
                    type="email"
                    name="email"
                    placeholder="correo@ejemplo.com"
                    class="input-style"
                    required
            >

        </div>

        <div class="input-group">

            <label class="input-label">
                Número telefónico
            </label>

            <input
                    type="tel"
                    name="telefono"
                    placeholder="3001234567"
                    class="input-style"
                    required
            >

        </div>

        <div class="input-group">

            <label class="input-label">
                Usuario
            </label>

            <input
                    type="text"
                    name="username"
                    placeholder="Nombre de usuario"
                    class="input-style"
                    required
            >

        </div>

        <div class="input-group">

            <label class="input-label">
                Contraseña
            </label>

            <input
                    type="password"
                    name="password"
                    placeholder="Crea una contraseña"
                    class="input-style"
                    required
            >

        </div>

        <button
                type="submit"
                class="submit-btn"
        >
            Registrarse
        </button>

        <div class="auth-footer">

            ¿Ya tienes cuenta?

            <a href="/login">
                Iniciar sesión
            </a>

        </div>

    </form>

</div>

<script th:src="@{/js/auth/auth.js}"></script>

</body>
</html>
