<!DOCTYPE html>
<html
        lang="es"
        xmlns:th="http://www.thymeleaf.org"
        class="h-full"
>
<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>Contactos</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
    >

    <style>

        *{
            font-family:'Inter',sans-serif;
        }

    </style>

</head>

<body class="
    bg-slate-100
    dark:bg-slate-950
    min-h-screen
    transition
">

<div class="flex min-h-screen">

    <!-- SIDEBAR -->

    <aside class="
        hidden
        lg:flex
        flex-col
        justify-between
        w-72
        bg-white
        dark:bg-slate-900
        border-r
        border-slate-200
        dark:border-slate-800
        p-6
    ">

        <div>

            <h1 class="
                text-3xl
                font-bold
                text-indigo-600
                mb-10
            ">
                Agenda Virtual
            </h1>

            <nav class="space-y-3">

                <a
                        href="/dashboard"
                        class="
                            block
                            px-5
                            py-4
                            rounded-2xl
                            hover:bg-slate-100
                            dark:hover:bg-slate-800
                            transition
                        "
                >
                    Dashboard
                </a>

                <a
                        href="/eventos"
                        class="
                            block
                            px-5
                            py-4
                            rounded-2xl
                            hover:bg-slate-100
                            dark:hover:bg-slate-800
                            transition
                        "
                >
                    Eventos
                </a>

                <a
                        href="/tareas"
                        class="
                            block
                            px-5
                            py-4
                            rounded-2xl
                            hover:bg-slate-100
                            dark:hover:bg-slate-800
                            transition
                        "
                >
                    Tareas
                </a>

                <a
                        href="/recordatorios"
                        class="
                            block
                            px-5
                            py-4
                            rounded-2xl
                            hover:bg-slate-100
                            dark:hover:bg-slate-800
                            transition
                        "
                >
                    Recordatorios
                </a>

                <a
                        href="/contactos"
                        class="
                            block
                            px-5
                            py-4
                            rounded-2xl
                            bg-indigo-600
                            text-white
                            font-semibold
                        "
                >
                    Contactos
                </a>

            </nav>

        </div>

        <a
                href="/logout"
                class="
                    bg-red-500
                    hover:bg-red-600
                    text-white
                    text-center
                    py-4
                    rounded-2xl
                    font-semibold
                    transition
                "
        >
            Cerrar sesión
        </a>

    </aside>

    <!-- MAIN -->

    <main class="flex-1 p-6 lg:p-10">

        <!-- HEADER -->

        <div class="
            flex
            flex-col
            lg:flex-row
            justify-between
            lg:items-center
            gap-6
            mb-10
        ">

            <div>

                <h1 class="
                    text-4xl
                    font-bold
                    text-slate-800
                    dark:text-white
                ">
                    Contactos
                </h1>

                <p class="
                    text-slate-500
                    dark:text-slate-400
                    mt-2
                ">
                    Gestiona tus contactos y eventos compartidos.
                </p>

            </div>

        </div>

        <!-- AGREGAR CONTACTO -->

        <div class="
            bg-white
            dark:bg-slate-900
            rounded-3xl
            p-6
            border
            border-slate-200
            dark:border-slate-800
            mb-8
        ">

            <form
                    action="/contactos/agregar"
                    method="post"
                    class="
                        flex
                        flex-col
                        md:flex-row
                        gap-4
                    "
            >

                <input
                        type="text"
                        name="telefono"
                        placeholder="Número telefónico"
                        class="
                            flex-1
                            p-4
                            rounded-2xl
                            bg-slate-100
                            dark:bg-slate-800
                            dark:text-white
                            border-0
                            outline-none
                        "
                        required
                >

                <button
                        type="submit"
                        class="
                            px-8
                            py-4
                            rounded-2xl
                            bg-indigo-600
                            hover:bg-indigo-700
                            text-white
                            font-semibold
                            transition
                        "
                >
                    Agregar contacto
                </button>

            </form>
            <!-- MENSAJE -->

            <div
                    th:if="${mensaje != null}"
                    th:text="${mensaje}"
                    class="
                mt-4
                p-4
                rounded-2xl
                bg-indigo-100
                dark:bg-indigo-900/30
                text-indigo-700
                dark:text-indigo-300
                font-medium
            "
            >
            </div>
        </div>

        <!-- VACIO -->

        <div
                th:if="${#lists.isEmpty(contactos)}"
                class="
                    bg-white
                    dark:bg-slate-900
                    rounded-3xl
                    p-10
                    text-center
                    border
                    border-slate-200
                    dark:border-slate-800
                "
        >

            <h3 class="
                text-2xl
                font-bold
                text-slate-700
                dark:text-white
            ">
                No tienes contactos registrados
            </h3>

            <p class="
                mt-3
                text-slate-500
            ">
                Agrega contactos usando su número telefónico.
            </p>

        </div>

        <!-- LISTA CONTACTOS -->

        <div class="
            grid
            grid-cols-1
            xl:grid-cols-2
            gap-6
        ">

            <div
                    th:each="contacto : ${contactos}"
                    class="
                        bg-white
                        dark:bg-slate-900
                        rounded-3xl
                        p-6
                        shadow-sm
                        border
                        border-slate-200
                        dark:border-slate-800
                    "
            >

                <div class="
                    flex
                    justify-between
                    items-start
                    gap-4
                ">

                    <div>

                        <h3
                                class="
                                    text-2xl
                                    font-bold
                                    text-slate-800
                                    dark:text-white
                                "
                                th:text="${contacto.nombreUsuario}"
                        >
                        </h3>

                        <p
                                class="
                                    text-slate-500
                                    mt-2
                                "
                                th:text="${contacto.telefono}"
                        >
                        </p>

                        <p
                                class="
                                    text-slate-500
                                    text-sm
                                    mt-1
                                "
                                th:text="${contacto.correoElectronico}"
                        >
                        </p>

                    </div>

                </div>

                <!-- ESTADISTICAS -->

                <div class="
                    mt-6
                    grid
                    grid-cols-2
                    gap-4
                ">

                    <div class="
                        bg-indigo-100
                        dark:bg-indigo-900/30
                        rounded-2xl
                        p-4
                    ">

                        <p class="
                            text-xs
                            text-indigo-700
                            dark:text-indigo-300
                        ">
                            Eventos en común
                        </p>

                        <h4
                                class="
                                    text-3xl
                                    font-bold
                                    mt-2
                                    text-indigo-800
                                    dark:text-white
                                "
                                th:text="${contacto.eventosEnComun}"
                        >
                            0
                        </h4>

                    </div>

                    <div class="
                        bg-emerald-100
                        dark:bg-emerald-900/30
                        rounded-2xl
                        p-4
                    ">

                        <p class="
                            text-xs
                            text-emerald-700
                            dark:text-emerald-300
                        ">
                            Te invitó a
                        </p>

                        <h4
                                class="
                                    text-3xl
                                    font-bold
                                    mt-2
                                    text-emerald-800
                                    dark:text-white
                                "
                                th:text="${contacto.eventosInvitado}"
                        >
                            0
                        </h4>

                    </div>

                </div>

                <!-- ACCIONES -->

                <div class="
                    mt-6
                    flex
                    justify-end
                ">

                    <form
                            th:action="@{'/contactos/eliminar/' + ${contacto.contactoId}}"
                            method="post"
                    >

                        <button
                                type="submit"
                                class="
                                    px-5
                                    py-3
                                    rounded-2xl
                                    bg-red-500
                                    hover:bg-red-600
                                    text-white
                                    font-medium
                                    transition
                                "
                        >
                            Eliminar contacto
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

</body>
</html>
