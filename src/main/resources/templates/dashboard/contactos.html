<!DOCTYPE html>
<html
        lang="es"
        xmlns:th="http://www.thymeleaf.org"
>

<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>Contactos</title>

    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
    >

    <link
            rel="stylesheet"
            th:href="@{/css/dashboard/layout.css}"
    >

    <link
            rel="stylesheet"
            th:href="@{/css/dashboard/contactos.css}"
    >

    <!-- EVITAR DESTELLO MODO OSCURO -->

    <script>

        if(localStorage.getItem('theme') === 'dark'){

            document.documentElement.classList.add('dark');

        }

    </script>

</head>

<body>

<div class="dashboard-layout">

    <!-- SIDEBAR -->

    <div
            th:replace="~{fragments/sidebar :: sidebar('contactos')}"
    ></div>

    <!-- MAIN -->

    <main class="main-content">

        <!-- TOPBAR -->

        <div
                th:replace="
                ~{fragments/topbar ::
                topbar(
                    'Contactos',
                    'Gestiona tus contactos y eventos compartidos'
                )}
            "
        ></div>

        <!-- AGREGAR CONTACTO -->

        <div class="dashboard-card mb-8">

            <form
                    action="/contactos/agregar"
                    method="post"
                    class="contact-form"
            >

                <input
                        type="text"
                        name="telefono"
                        placeholder="Número telefónico"
                        class="input-style"
                        inputmode="numeric"
                        pattern="\d{10}"
                        minlength="10"
                        maxlength="10"
                        title="Número celular colombiano (10 dígitos, solo números)"
                        required
                >

                <button
                        type="submit"
                        class="primary-btn"
                >
                    Agregar contacto
                </button>

            </form>

            <!-- MENSAJE -->

            <div
                    th:if="${mensaje != null}"
                    th:text="${mensaje}"
                    class="message-alert"
                    th:classappend="${mensajeTipo}"
            ></div>

        </div>

        <!-- VACIO -->

        <div
                th:if="${#lists.isEmpty(contactos)}"
                class="dashboard-card empty-card"
        >

            <h3 class="empty-title">
                No tienes contactos registrados
            </h3>

            <p class="empty-subtitle">
                Agrega contactos usando su número telefónico.
            </p>

        </div>

        <!-- LISTA CONTACTOS -->

        <div class="contacts-grid">

            <div
                    th:each="contacto : ${contactos}"
                    class="dashboard-card contact-card"
            >

                <!-- HEADER -->

                <div class="contact-header">

                    <div>

                        <h3
                                class="contact-name"
                                th:text="${contacto.nombreUsuario}"
                        ></h3>

                        <p
                                class="contact-phone"
                                th:text="${contacto.telefono}"
                        ></p>

                        <p
                                class="contact-email"
                                th:text="${contacto.correoElectronico}"
                        ></p>

                    </div>

                </div>

                <!-- ESTADISTICAS -->

                <div class="stats-grid">

                    <div class="stat-box stat-indigo">

                        <p class="stat-label">
                            Eventos en común
                        </p>

                        <h4
                                class="stat-value"
                                th:text="${contacto.eventosEnComun}"
                        >
                            0
                        </h4>

                    </div>

                    <div class="stat-box stat-green">

                        <p class="stat-label">
                            Te invitó a
                        </p>

                        <h4
                                class="stat-value"
                                th:text="${contacto.eventosInvitado}"
                        >
                            0
                        </h4>

                    </div>

                </div>

                <!-- ACCIONES -->

                <div class="contact-actions">

                    <form
                            th:action="@{'/contactos/eliminar/' + ${contacto.contactoId}}"
                            method="post"
                    >

                        <button
                                type="submit"
                                class="delete-btn"
                        >
                            Eliminar contacto
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </main>

</div>

<script>

    function toggleTheme(){

        document.documentElement.classList.toggle('dark');

        if(document.documentElement.classList.contains('dark')){

            localStorage.setItem('theme','dark');

        }else{

            localStorage.setItem('theme','light');

        }
    }

</script>

</body>
</html>
