<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        :root{
            --bg:#f5f7fb;
            --card:#fff;
            --text:#1e293b;
            --primary:#4f46e5;
            --border:#e2e8f0;
        }

        [data-theme="dark"]{
            --bg:#0f172a;
            --card:#1e293b;
            --text:#fff;
            --primary:#818cf8;
            --border:#334155;
        }

        body{
            background:var(--bg);
            color:var(--text);
            transition:.3s;
        }

        .sidebar{
            width:260px;
            height:100vh;
            position:fixed;
            background:var(--card);
            padding:30px;
            border-right:1px solid var(--border);
        }

        .logo{
            font-size:1.6rem;
            font-weight:700;
            margin-bottom:40px;
            color:var(--primary);
        }

        .menu{
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        .menu a{
            padding:14px;
            border-radius:12px;
            text-decoration:none;
            color:var(--text);
            transition:.3s;
        }

        .menu a:hover{
            background:var(--primary);
            color:white;
        }

        .main{
            margin-left:260px;
            padding:40px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
            gap:20px;
            margin-top:30px;
        }

        .card{
            background:var(--card);
            padding:30px;
            border-radius:24px;
            border:1px solid var(--border);
            box-shadow:0 10px 30px rgba(0,0,0,.06);
            transition:.3s;
        }

        .card:hover{
            transform:translateY(-5px);
        }

        .theme{
            position:fixed;
            top:20px;
            right:20px;
        }

        .theme button{
            width:45px;
            height:45px;
            border-radius:50%;
            border:none;
            cursor:pointer;
        }

        @media(max-width:900px){

            .sidebar{
                position:relative;
                width:100%;
                height:auto;
            }

            .main{
                margin-left:0;
            }

        }
    </style>
</head>

<body>

<div class="theme">
    <button onclick="toggleTheme()">🌙</button>
</div>

<div class="sidebar">

    <div class="logo">Agenda Virtual</div>

    <div class="menu">
        <a href="#">Dashboard</a>
        <a href="#">Contactos</a>
        <a href="#">Eventos</a>
        <a href="#">Tareas</a>
        <a href="/logout">Cerrar sesión</a>
    </div>

</div>

<div class="main">

    <h1>Bienvenido</h1>

    <p>Gestiona tu información desde un panel moderno y organizado.</p>

    <div class="cards">

        <div class="card">
            <h2>125</h2>
            <p>Contactos registrados</p>
        </div>

        <div class="card">
            <h2>12</h2>
            <p>Eventos próximos</p>
        </div>

        <div class="card">
            <h2>8</h2>
            <p>Tareas pendientes</p>
        </div>

        <div class="card">
            <h2>99%</h2>
            <p>Disponibilidad</p>
        </div>

    </div>

</div>

<script>
    function toggleTheme(){
        const html=document.documentElement;
        const current=html.getAttribute("data-theme");

        if(current==="dark"){
            html.setAttribute("data-theme","light");
            localStorage.setItem("theme","light");
        }else{
            html.setAttribute("data-theme","dark");
            localStorage.setItem("theme","dark");
        }
    }

    const savedTheme=localStorage.getItem("theme");
    if(savedTheme){
        document.documentElement.setAttribute("data-theme",savedTheme);
    }
</script>

</body>
</html>
