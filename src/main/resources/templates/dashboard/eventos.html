<!DOCTYPE html>
<html
        lang="es"
        xmlns:th="http://www.thymeleaf.org"
>

<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>Eventos</title>

    <link
            rel="stylesheet"
            th:href="@{/css/dashboard/layout.css}"
    >

    <link
            rel="stylesheet"
            th:href="@{/css/dashboard/eventos.css}"
    >

    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
    >

    <script>

        if(localStorage.getItem('theme') === 'dark'){

            document.documentElement.classList.add('dark');

        }

    </script>

</head>

<body>

<div class="dashboard-layout">

    <div
            th:replace="~{fragments/sidebar :: sidebar('eventos')}"
    ></div>

    <main class="main-content">

        <div
                th:replace="~{fragments/topbar :: topbar(
                'Eventos',
                'Gestiona tus eventos y reuniones'
            )}"
        ></div>

        <div class="events-header">

            <div>

                <h2 class="events-title">
                    Mis eventos
                </h2>

                <p class="events-subtitle">
                    Administra todos tus eventos.
                </p>

            </div>

            <button
                    class="primary-btn"
                    onclick="openCreateModal()"
            >
                + Crear evento
            </button>

        </div>

        <!-- SIN EVENTOS -->

        <div
                th:if="${#lists.isEmpty(eventos)}"
                class="empty-events"
        >

            <h3>
                No tienes eventos creados
            </h3>

            <p>
                Crea tu primer evento para comenzar.
            </p>

        </div>

        <!-- EVENTOS -->

        <div
                th:unless="${#lists.isEmpty(eventos)}"
                class="events-grid"
        >

            <div
                    class="event-card"
                    th:each="evento : ${eventos}"
            >

                <div
                        class="event-color"
                        th:style="'background:' + ${evento.color}"
                ></div>

                <h3
                        class="event-title"
                        th:text="${evento.titulo}"
                ></h3>

                <p
                        class="event-description"
                        th:text="${evento.descripcion}"
                ></p>

                <div class="event-info">

                    <span>
                        📅
                        <span th:text="${evento.fechaInicio}"></span>
                        -
                        <span th:text="${evento.fechaFin}"></span>
                    </span>

                    <span th:if="${!evento.todoElDia}">
                        ⏰
                        <span th:text="${evento.horaInicio}"></span>
                        -
                        <span th:text="${evento.horaFin}"></span>
                    </span>

                    <span>
                        📍
                        <span th:text="${evento.ubicacion}"></span>
                    </span>

                    <span
                            class="event-badge"
                            th:text="${evento.estado}"
                    ></span>

                </div>

                <div class="event-actions">

                    <button
                            class="secondary-btn"
                            th:attr="
                            data-id=${evento.id},
                            data-titulo=${evento.titulo},
                            data-descripcion=${evento.descripcion},
                            data-fechainicio=${evento.fechaInicio},
                            data-fechafin=${evento.fechaFin},
                            data-horainicio=${evento.horaInicio},
                            data-horafin=${evento.horaFin},
                            data-todoeldia=${evento.todoElDia},
                            data-ubicacion=${evento.ubicacion},
                            data-color=${evento.color},
                            data-estado=${evento.estado}
                        "
                            onclick="openEditModal(this)"
                    >
                        Editar
                    </button>

                    <form
                            th:action="@{/eventos/delete/{id}(id=${evento.id})}"
                            method="post"
                            style="flex:1;"
                    >

                        <button
                                type="submit"
                                class="danger-btn"
                        >
                            Eliminar
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </main>

</div>

<!-- MODAL CREAR -->

<div
        class="modal-overlay"
        id="createModal"
>

    <div class="modal">

        <div class="modal-header">

            <h2>
                Crear evento
            </h2>

            <button
                    class="close-btn"
                    onclick="attemptCloseModal('createModal')"
            >
                ✖
            </button>

        </div>

        <form
                th:action="@{/eventos}"
                method="post"
                id="createForm"
        >

            <div class="form-grid">

                <div class="form-group form-group-full">

                    <label>Título</label>

                    <input
                            type="text"
                            name="titulo"
                            class="form-input"
                            required
                    >

                </div>

                <div class="form-group form-group-full">

                    <label>Descripción</label>

                    <textarea
                            name="descripcion"
                            class="form-textarea"
                    ></textarea>

                </div>

                <div class="form-group">

                    <label>Fecha inicio</label>

                    <input
                            type="date"
                            name="fechaInicio"
                            class="form-input"
                            required
                    >

                </div>

                <div class="form-group">

                    <label>Fecha fin</label>

                    <input
                            type="date"
                            name="fechaFin"
                            class="form-input"
                            required
                    >

                </div>

                <div class="form-group horas-container">

                    <label>Hora inicio</label>

                    <input
                            type="time"
                            name="horaInicio"
                            class="form-input"
                    >

                </div>

                <div class="form-group horas-container">

                    <label>Hora fin</label>

                    <input
                            type="time"
                            name="horaFin"
                            class="form-input"
                    >

                </div>

                <div class="form-group">

                    <label>Ubicación</label>

                    <input
                            type="text"
                            name="ubicacion"
                            class="form-input"
                    >

                </div>

                <div class="form-group">

                    <label>Color</label>

                    <input
                            type="color"
                            name="color"
                            value="#6366f1"
                            class="form-input"
                    >

                </div>

                <div class="form-group">

                    <label>Estado</label>

                    <select
                            name="estado"
                            class="form-select"
                    >

                        <option value="PENDIENTE">PENDIENTE</option>
                        <option value="EN_PROGRESO">EN PROGRESO</option>
                        <option value="FINALIZADO">FINALIZADO</option>
                        <option value="CANCELADO">CANCELADO</option>
                        <option value="CONFIRMADO">CONFIRMADO</option>

                    </select>

                </div>

                <div class="form-group form-group-full">

                    <div class="checkbox-group">

                        <input
                                type="checkbox"
                                name="todoElDia"
                                value="true"
                                onchange="toggleHoras(this)"
                        >

                        <label>
                            Todo el día
                        </label>

                    </div>

                </div>

            </div>

            <div class="modal-actions">

                <button
                        type="button"
                        class="cancel-btn"
                        onclick="attemptCloseModal('createModal')"
                >
                    Cancelar
                </button>

                <button
                        type="submit"
                        class="save-btn"
                >
                    Guardar evento
                </button>

            </div>

        </form>

    </div>

</div>

<!-- MODAL EDITAR -->

<div
        class="modal-overlay"
        id="editModal"
>

    <div class="modal">

        <div class="modal-header">

            <h2>
                Editar evento
            </h2>

            <button
                    class="close-btn"
                    onclick="attemptCloseModal('editModal')"
            >
                ✖
            </button>

        </div>

        <form
                method="post"
                id="editForm"
        >

            <div class="form-grid">

                <div class="form-group form-group-full">

                    <label>Título</label>

                    <input
                            type="text"
                            name="titulo"
                            id="editTitulo"
                            class="form-input"
                            required
                    >

                </div>

                <div class="form-group form-group-full">

                    <label>Descripción</label>

                    <textarea
                            name="descripcion"
                            id="editDescripcion"
                            class="form-textarea"
                    ></textarea>

                </div>

                <div class="form-group">

                    <label>Fecha inicio</label>

                    <input
                            type="date"
                            name="fechaInicio"
                            id="editFechaInicio"
                            class="form-input"
                            required
                    >

                </div>

                <div class="form-group">

                    <label>Fecha fin</label>

                    <input
                            type="date"
                            name="fechaFin"
                            id="editFechaFin"
                            class="form-input"
                            required
                    >

                </div>

                <div class="form-group horas-container">

                    <label>Hora inicio</label>

                    <input
                            type="time"
                            name="horaInicio"
                            id="editHoraInicio"
                            class="form-input"
                    >

                </div>

                <div class="form-group horas-container">

                    <label>Hora fin</label>

                    <input
                            type="time"
                            name="horaFin"
                            id="editHoraFin"
                            class="form-input"
                    >

                </div>

                <div class="form-group">

                    <label>Ubicación</label>

                    <input
                            type="text"
                            name="ubicacion"
                            id="editUbicacion"
                            class="form-input"
                    >

                </div>

                <div class="form-group">

                    <label>Color</label>

                    <input
                            type="color"
                            name="color"
                            id="editColor"
                            class="form-input"
                    >

                </div>

                <div class="form-group">

                    <label>Estado</label>

                    <select
                            name="estado"
                            id="editEstado"
                            class="form-select"
                    >

                        <option value="PENDIENTE">PENDIENTE</option>
                        <option value="EN_PROGRESO">EN PROGRESO</option>
                        <option value="FINALIZADO">FINALIZADO</option>
                        <option value="CANCELADO">CANCELADO</option>
                        <option value="CONFIRMADO">CONFIRMADO</option>

                    </select>

                </div>

                <div class="form-group form-group-full">

                    <div class="checkbox-group">

                        <input
                                type="checkbox"
                                name="todoElDia"
                                id="editTodoElDia"
                                onchange="toggleHoras(this)"
                        >

                        <label>
                            Todo el día
                        </label>

                    </div>

                </div>

            </div>

            <div class="modal-actions">

                <button
                        type="button"
                        class="cancel-btn"
                        onclick="attemptCloseModal('editModal')"
                >
                    Cancelar
                </button>

                <button
                        type="submit"
                        class="save-btn"
                >
                    Guardar cambios
                </button>

            </div>

        </form>

    </div>

</div>

<script
        th:src="@{/js/dashboard/layout.js}"
></script>

<script
        th:src="@{/js/dashboard/eventos.js}"
></script>

</body>
</html>
