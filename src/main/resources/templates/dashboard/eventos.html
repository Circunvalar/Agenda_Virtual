<!DOCTYPE html>
<html
        lang="es"
        xmlns:th="http://www.thymeleaf.org"
>

<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>Eventos</title>

    <link
            rel="stylesheet"
            th:href="@{/css/dashboard/layout.css}"
    >

    <link
            rel="stylesheet"
            th:href="@{/css/dashboard/eventos.css}"
    >

    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
    >
    <script>

        if(localStorage.getItem('theme') === 'dark'){

            document.documentElement.classList.add('dark');

        }

    </script>
</head>

<body>

<div class="dashboard-layout">

    <!-- SIDEBAR -->

    <div
            th:replace="~{fragments/sidebar :: sidebar('eventos')}"
    ></div>

    <!-- MAIN -->

    <main class="main-content">

        <!-- TOPBAR -->

        <div
                th:replace="
        ~{fragments/topbar ::
        topbar(
            'Eventos',
            'Organiza tus reuniones y actividades'
        )}
    "
        ></div>

        <!-- HEADER ACTION -->

        <div class="events-header">

            <button
                    type="button"
                    onclick="openCreateModal()"
                    class="primary-btn"
            >
                + Nuevo Evento
            </button>

        </div>

        <!-- VACIO -->

        <div
                th:if="${#lists.isEmpty(eventos)}"
                class="empty-card"
        >

            <h3>
                No tienes eventos registrados
            </h3>

            <p>
                Crea tu primer evento para comenzar.
            </p>

        </div>

        <!-- LISTA -->

        <div class="events-grid">

            <div
                    th:each="evento : ${eventos}"
                    class="event-card"
                    th:attr="
                        data-id=${evento.id},
                        data-titulo=${evento.titulo},
                        data-descripcion=${evento.descripcion},
                        data-fechainicio=${evento.fechaInicio},
                        data-fechafin=${evento.fechaFin},
                        data-horainicio=${evento.horaInicio},
                        data-horafin=${evento.horaFin},
                        data-ubicacion=${evento.ubicacion},
                        data-color=${evento.color},
                        data-todoeldia=${evento.todoElDia}
                    "
                    onclick="openDetailsModal(this)"
            >

                <div class="event-top">

                    <div>

                        <h3
                                th:text="${evento.titulo}"
                        ></h3>

                        <p
                                th:text="${evento.descripcion}"
                        ></p>

                    </div>

                    <div
                            class="event-color"
                            th:style="'background:'+${evento.color}"
                    ></div>

                </div>

                <div class="event-tags">

                    <span
                            class="tag-date"
                            th:text="${evento.fechaInicio}"
                    ></span>

                    <span
                            class="tag-status"
                            th:text="${evento.estado}"
                    ></span>

                    <span
                            th:if="${evento.todoElDia}"
                            class="tag-all-day"
                    >
                        Todo el día
                    </span>

                </div>

            </div>

        </div>

    </main>

</div>

<!-- MODAL -->

<div
        id="modal"
        class="modal-overlay hidden"
        onclick="outsideClick(event)"
>

    <div class="modal-content">

        <!-- CERRAR -->

        <button
                type="button"
                onclick="attemptCloseModal()"
                class="close-btn"
        >
            ×
        </button>

        <!-- ALERTA -->

        <div
                id="warningBox"
                class="warning-box hidden"
        >
            No puedes cerrar sin guardar cambios.
        </div>

        <h2
                id="modalTitle"
                class="modal-title"
        >
            Nuevo Evento
        </h2>

        <form
                id="eventoForm"
                method="post"
                class="event-form"
        >

            <input
                    type="hidden"
                    id="eventoId"
                    name="id"
            >

            <input
                    type="text"
                    id="titulo"
                    name="titulo"
                    placeholder="Título"
                    class="input-style"
                    required
            >

            <textarea
                    id="descripcion"
                    name="descripcion"
                    placeholder="Descripción"
                    rows="4"
                    class="input-style"
            ></textarea>

            <!-- TODO EL DIA -->

            <label class="checkbox-container">

                <input
                        type="checkbox"
                        id="todoElDia"
                        name="todoElDia"
                        onchange="toggleHoras()"
                >

                <span>
                    Todo el día
                </span>

            </label>

            <!-- FECHAS -->

            <div class="form-grid">

                <input
                        type="date"
                        id="fechaInicio"
                        name="fechaInicio"
                        class="input-style"
                        required
                >

                <input
                        type="date"
                        id="fechaFin"
                        name="fechaFin"
                        class="input-style"
                        required
                >

            </div>

            <!-- HORAS -->

            <div
                    id="horasContainer"
                    class="form-grid"
            >

                <input
                        type="time"
                        id="horaInicio"
                        name="horaInicio"
                        class="input-style"
                >

                <input
                        type="time"
                        id="horaFin"
                        name="horaFin"
                        class="input-style"
                >

            </div>

            <!-- UBICACION -->

            <input
                    type="text"
                    id="ubicacion"
                    name="ubicacion"
                    placeholder="Ubicación"
                    class="input-style"
            >

            <!-- COLOR -->

            <input
                    type="color"
                    id="color"
                    name="color"
                    class="color-input"
            >

            <!-- BOTONES -->

            <div class="button-group">

                <button
                        id="saveBtn"
                        type="submit"
                        class="save-btn"
                >
                    Guardar cambios
                </button>

                <button
                        type="button"
                        onclick="forceCloseModal()"
                        class="cancel-btn"
                >
                    Cancelar
                </button>

            </div>

        </form>

        <!-- ELIMINAR -->

        <form
                id="deleteForm"
                method="post"
                class="delete-form"
        >

            <button
                    type="submit"
                    class="delete-btn"
            >
                Eliminar Evento
            </button>

        </form>

    </div>

</div>

<script>

    const modal = document.getElementById('modal');

    let editMode = false;

    function openCreateModal() {

        editMode = false;

        document.getElementById('modalTitle').innerText = 'Nuevo Evento';

        document.getElementById('eventoForm').action = '/eventos';

        document.getElementById('deleteForm').classList.add('hidden');

        document.getElementById('eventoId').value = '';
        document.getElementById('titulo').value = '';
        document.getElementById('descripcion').value = '';
        document.getElementById('fechaInicio').value = '';
        document.getElementById('fechaFin').value = '';
        document.getElementById('horaInicio').value = '';
        document.getElementById('horaFin').value = '';
        document.getElementById('ubicacion').value = '';
        document.getElementById('color').value = '#6366f1';
        document.getElementById('todoElDia').checked = false;

        modal.classList.remove('hidden');
        modal.classList.add('flex');

        toggleHoras();
    }

    function openDetailsModal(card) {

        editMode = true;

        document.getElementById('modalTitle').innerText = 'Editar Evento';

        const id = card.dataset.id;

        document.getElementById('eventoForm').action =
            '/eventos/update/' + id;

        document.getElementById('deleteForm').action =
            '/eventos/delete/' + id;

        document.getElementById('deleteForm').classList.remove('hidden');

        document.getElementById('eventoId').value = id;

        document.getElementById('titulo').value =
            card.dataset.titulo || '';

        document.getElementById('descripcion').value =
            card.dataset.descripcion || '';

        document.getElementById('fechaInicio').value =
            card.dataset.fechainicio || '';

        document.getElementById('fechaFin').value =
            card.dataset.fechafin || '';

        document.getElementById('horaInicio').value =
            card.dataset.horainicio || '';

        document.getElementById('horaFin').value =
            card.dataset.horafin || '';

        document.getElementById('ubicacion').value =
            card.dataset.ubicacion || '';

        document.getElementById('color').value =
            card.dataset.color || '#6366f1';

        document.getElementById('todoElDia').checked =
            card.dataset.todoeldia === 'true';

        modal.classList.remove('hidden');
        modal.classList.add('flex');

        toggleHoras();
    }

    function toggleHoras() {

        const todoElDia =
            document.getElementById('todoElDia').checked;

        const horasContainer =
            document.getElementById('horasContainer');

        if(todoElDia){

            horasContainer.classList.add('hidden');

        }else{

            horasContainer.classList.remove('hidden');

        }
    }

    function attemptCloseModal() {

        if(editMode){

            const warning =
                document.getElementById('warningBox');

            warning.classList.remove('hidden');

            return;
        }

        forceCloseModal();
    }

    function forceCloseModal() {

        modal.classList.add('hidden');
        modal.classList.remove('flex');

        document
            .getElementById('warningBox')
            .classList.add('hidden');
    }

    function outsideClick(event) {

        if(event.target === modal){

            attemptCloseModal();

        }
    }

    function toggleTheme() {

        document.documentElement.classList.toggle('dark');

        if(document.documentElement.classList.contains('dark')){

            localStorage.setItem('theme', 'dark');

        }else{

            localStorage.setItem('theme', 'light');

        }
    }

</script>

</body>
</html>
