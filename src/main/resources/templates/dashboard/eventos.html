<!DOCTYPE html>
<html
        lang="es"
        xmlns:th="http://www.thymeleaf.org"
        class="h-full"
>
<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>Eventos</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
    >

    <!-- CSS -->
    <link
            rel="stylesheet"
            th:href="@{/css/dashboard/eventos.css}"
    >

</head>

<body class="
    bg-slate-100
    dark:bg-slate-950
    min-h-screen
    transition
">

<div class="flex min-h-screen">

    <!-- SIDEBAR -->

    <aside class="
        sidebar
    ">

        <div>

            <h1 class="
                text-3xl
                font-bold
                text-indigo-600
                mb-10
            ">
                Agenda Virtual
            </h1>

            <nav class="space-y-3">

                <a
                        href="/dashboard"
                        class="nav-link"
                >
                    Dashboard
                </a>

                <a
                        href="/eventos"
                        class="nav-link-active"
                >
                    Eventos
                </a>

                <a
                        href="/tareas"
                        class="nav-link"
                >
                    Tareas
                </a>

                <a
                        href="/recordatorios"
                        class="nav-link"
                >
                    Recordatorios
                </a>

            </nav>

        </div>

        <a
                href="/logout"
                class="logout-btn"
        >
            Cerrar sesión
        </a>

    </aside>

    <!-- MAIN -->

    <main class="flex-1 p-6 lg:p-10">

        <!-- HEADER -->

        <div class="
            flex
            flex-col
            lg:flex-row
            justify-between
            lg:items-center
            gap-6
            mb-10
        ">

            <div>

                <h2 class="
                    text-4xl
                    font-bold
                    text-slate-800
                    dark:text-white
                ">
                    Eventos
                </h2>

                <p class="
                    mt-2
                    text-slate-500
                    dark:text-slate-400
                ">
                    Organiza tus eventos y reuniones.
                </p>

            </div>

            <div class="flex gap-4">

                <button
                        type="button"
                        onclick="toggleTheme()"
                        class="theme-btn"
                >
                    🌙
                </button>

                <button
                        type="button"
                        onclick="openModal()"
                        class="primary-btn"
                >
                    + Nuevo Evento
                </button>

            </div>

        </div>

        <!-- MENSAJE SI NO HAY EVENTOS -->

        <div
                th:if="${#lists.isEmpty(eventos)}"
                class="empty-card"
        >

            <h3 class="
                text-2xl
                font-bold
                text-slate-700
                dark:text-white
            ">
                No tienes eventos registrados
            </h3>

            <p class="
                mt-3
                text-slate-500
            ">
                Crea tu primer evento para comenzar.
            </p>

        </div>

        <!-- LISTADO -->

        <div class="
            grid
            grid-cols-1
            xl:grid-cols-2
            gap-6
        ">

            <div
                    th:each="evento : ${eventos}"
                    class="event-card"
            >

                <div class="
                    flex
                    justify-between
                    items-start
                    gap-4
                ">

                    <div>

                        <h3
                                th:text="${evento.titulo}"
                                class="
                                    text-2xl
                                    font-bold
                                    text-slate-800
                                    dark:text-white
                                "
                        ></h3>

                        <p
                                th:text="${evento.descripcion}"
                                class="
                                    mt-3
                                    text-slate-500
                                "
                        ></p>

                    </div>

                    <div
                            class="
                                w-5
                                h-5
                                rounded-full
                            "
                            th:style="'background:'+${evento.color}"
                    ></div>

                </div>

                <div class="
                    mt-6
                    flex
                    flex-wrap
                    gap-3
                ">

                    <span
                            class="tag-date"
                            th:text="${evento.fechaInicio}"
                    ></span>

                    <span
                            class="tag-status"
                            th:text="${evento.estado}"
                    ></span>

                    <span
                            th:if="${evento.todoElDia}"
                            class="tag-all-day"
                    >
                        Todo el día
                    </span>

                </div>

                <div class="
                    mt-6
                    flex
                    justify-end
                ">

                    <form
                            th:action="@{'/eventos/delete/' + ${evento.id}}"
                            method="post"
                    >

                        <button
                                type="submit"
                                class="delete-btn"
                        >
                            Eliminar
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </main>

</div>

<!-- MODAL -->

<div
        id="modal"
        class="modal-overlay hidden"
>

    <div class="modal-container">

        <div class="
            flex
            justify-between
            items-center
            mb-8
        ">

            <h2 class="
                text-3xl
                font-bold
                dark:text-white
            ">
                Nuevo Evento
            </h2>

            <button
                    type="button"
                    onclick="closeModal()"
                    class="
                        text-2xl
                        dark:text-white
                    "
            >
                ×
            </button>

        </div>

        <form
                th:action="@{/eventos}"
                th:object="${evento}"
                method="post"
                class="space-y-5"
        >

            <input
                    type="text"
                    th:field="*{titulo}"
                    placeholder="Título"
                    class="input-style"
                    required
            >

            <textarea
                    th:field="*{descripcion}"
                    placeholder="Descripción"
                    rows="4"
                    class="input-style"
            ></textarea>

            <!-- TODO EL DIA -->

            <label class="checkbox-container">

                <input
                        type="checkbox"
                        th:field="*{todoElDia}"
                        id="todoElDia"
                        onchange="toggleHoras()"
                        class="
                            w-5
                            h-5
                        "
                >

                <span class="
                    text-slate-700
                    dark:text-white
                    font-medium
                ">
                    Todo el día
                </span>

            </label>

            <!-- FECHAS -->

            <div class="
                grid
                grid-cols-1
                md:grid-cols-2
                gap-4
            ">

                <input
                        type="date"
                        th:field="*{fechaInicio}"
                        class="input-style"
                        required
                >

                <input
                        type="date"
                        th:field="*{fechaFin}"
                        class="input-style"
                        required
                >

            </div>

            <!-- HORAS -->

            <div
                    id="horasContainer"
                    class="
                        grid
                        grid-cols-1
                        md:grid-cols-2
                        gap-4
                    "
            >

                <input
                        type="time"
                        th:field="*{horaInicio}"
                        class="input-style hora-input"
                >

                <input
                        type="time"
                        th:field="*{horaFin}"
                        class="input-style hora-input"
                >

            </div>

            <input
                    type="text"
                    th:field="*{ubicacion}"
                    placeholder="Ubicación"
                    class="input-style"
            >

            <input
                    type="color"
                    th:field="*{color}"
                    class="
                        w-full
                        h-14
                        rounded-2xl
                        overflow-hidden
                    "
            >

            <button
                    type="submit"
                    class="submit-btn"
            >
                Crear Evento
            </button>

        </form>

    </div>

</div>

<!-- JS -->
<script th:src="@{/js/dashboard/eventos.js}"></script>

</body>
</html>
