<!DOCTYPE html>
<html
        lang="es"
        xmlns:th="http://www.thymeleaf.org"
>

<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>
        Recordatorios
    </title>

    <link
            rel="stylesheet"
            th:href="@{/css/dashboard/layout.css}"
    >

    <link
            rel="stylesheet"
            th:href="@{/css/dashboard/recordatorios.css}"
    >

    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
    >

    <script>

        if(localStorage.getItem('theme') === 'dark'){

            document.documentElement.classList.add('dark');

        }

    </script>

</head>

<body>

<div class="dashboard-layout">

    <!-- SIDEBAR -->

    <div
            th:replace="~{fragments/sidebar :: sidebar('recordatorios')}"
    ></div>

    <!-- MAIN -->

    <main class="main-content">

        <!-- TOPBAR -->

        <div
                th:replace="~{fragments/topbar :: topbar(
                    'Recordatorios',
                    'Gestiona actividades, medicamentos y tareas importantes'
                )}"
        ></div>

        <!-- HEADER -->

        <div class="recordatorios-header">

            <div>

                <h2>
                    Mis recordatorios
                </h2>

                <p>
                    Organiza tus actividades importantes.
                </p>

            </div>

            <button
                    class="primary-btn"
                    onclick="openCreateModal()"
            >
                + Nuevo recordatorio
            </button>

        </div>

        <!-- STATS -->

        <div class="stats-grid">

            <div class="stat-card-mini">

                <span>
                    Total
                </span>

                <h3
                        th:text="${#lists.size(recordatorios)}"
                >
                    0
                </h3>

            </div>

            <div class="stat-card-mini">

                <span>
                    Completados
                </span>

                <h3
                        th:text="${recordatorios.?[completado == true].size()}"
                >
                    0
                </h3>

            </div>

            <div class="stat-card-mini">

                <span>
                    Pendientes
                </span>

                <h3
                        th:text="${recordatorios.?[completado == false].size()}"
                >
                    0
                </h3>

            </div>

            <div class="stat-card-mini">

                <span>
                    Repetitivos
                </span>

                <h3
                        th:text="${recordatorios.?[repetitivo == true].size()}"
                >
                    0
                </h3>

            </div>

        </div>

        <!-- FILTROS -->

        <div class="filters-container">

            <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="Buscar recordatorio..."
            >

            <select
                    id="priorityFilter"
                    class="filter-select"
            >

                <option value="">
                    Todas las prioridades
                </option>

                <option value="ALTA">
                    Alta
                </option>

                <option value="MEDIA">
                    Media
                </option>

                <option value="BAJA">
                    Baja
                </option>

            </select>

            <select
                    id="categoryFilter"
                    class="filter-select"
            >

                <option value="">
                    Todas las categorías
                </option>

                <option value="SALUD">
                    Medicamento
                </option>

                <option value="HOGAR">
                    Hogar
                </option>

                <option value="TRABAJO">
                    Trabajo
                </option>

                <option value="ESTUDIO">
                    Estudio
                </option>

                <option value="PERSONAL">
                    Personal
                </option>

                <option value="FINANZAS">
                    Finanzas
                </option>

                <option value="OTRO">
                    Otro
                </option>

            </select>

        </div>

        <!-- EMPTY -->

        <div
                th:if="${#lists.isEmpty(recordatorios)}"
                class="empty-state"
        >

            <h3>
                No tienes recordatorios
            </h3>

            <p>
                Crea tu primer recordatorio.
            </p>

        </div>

        <!-- LIST -->

        <div
                th:unless="${#lists.isEmpty(recordatorios)}"
                class="recordatorios-list"
        >

            <div
                    class="recordatorio-card"
                    th:each="recordatorio : ${recordatorios}"
                    th:attr="
                        data-prioridad=${recordatorio.prioridad},
                        data-categoria=${recordatorio.categoria}
                    "
            >

                <div
                        class="recordatorio-color"
                        th:style="'background:' + ${recordatorio.color}"
                ></div>

                <div class="recordatorio-main">

                    <div class="recordatorio-top">

                        <div class="recordatorio-title-group">

                            <form
                                    th:action="@{/recordatorios/complete/{id}(id=${recordatorio.id})}"
                                    method="post"
                            >

                                <button
                                        type="submit"
                                        class="checkbox-btn"
                                >
                                    ✓
                                </button>

                            </form>

                            <div>

                                <h3
                                        th:text="${recordatorio.titulo}"
                                ></h3>

                                <p
                                        th:text="${recordatorio.mensaje}"
                                ></p>

                            </div>

                        </div>

                        <div class="badges">

                            <span
                                    class="badge prioridad"
                                    th:text="${recordatorio.prioridad}"
                            ></span>

                            <span
                                    class="badge categoria"
                                    th:text="${recordatorio.categoria}"
                            ></span>

                            <span
                                    class="badge repetitivo"
                                    th:if="${recordatorio.repetitivo}"
                            >
                                🔁 Repetitivo
                            </span>

                        </div>

                    </div>

                    <div class="recordatorio-bottom">

                        <div class="recordatorio-info">

                            <span>
                                🕒
                                <span
                                        th:text="${#temporals.format(
                                        recordatorio.fechaLimite,
                                        'dd/MM/yyyy HH:mm'
                                    )}"
                                ></span>
                            </span>

                            <span
                                    th:if="${recordatorio.recordarAntesMinutos != null}"
                            >
                                ⏰ Avisar
                                <span
                                        th:text="${recordatorio.recordarAntesMinutos}"
                                ></span>
                                min antes
                            </span>

                        </div>

                        <div class="recordatorio-actions">

                            <button
                                    class="secondary-btn"
                                    onclick="openEditModal(this)"

                                    th:attr="
                                        data-id=${recordatorio.id},
                                        data-titulo=${recordatorio.titulo},
                                        data-mensaje=${recordatorio.mensaje},
                                        data-fecha=${recordatorio.fechaLimite},
                                        data-prioridad=${recordatorio.prioridad},
                                        data-categoria=${recordatorio.categoria},
                                        data-color=${recordatorio.color},
                                        data-repetitivo=${recordatorio.repetitivo},
                                        data-intervalodias=${recordatorio.intervaloDias},
                                        data-recordarantes=${recordatorio.recordarAntesMinutos}
                                    "
                            >
                                Editar
                            </button>

                            <form
                                    th:action="@{/recordatorios/delete/{id}(id=${recordatorio.id})}"
                                    method="post"
                            >

                                <button
                                        type="submit"
                                        class="danger-btn"
                                >
                                    Eliminar
                                </button>

                            </form>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </main>

</div>

<!-- MODAL CREAR -->

<div
        class="modal-overlay"
        id="createModal"
>

    <div class="modal">

        <div class="modal-header">

            <h2>
                Crear recordatorio
            </h2>

            <button
                    class="close-btn"
                    onclick="attemptCloseModal('createModal')"
            >
                ✖
            </button>

        </div>

        <form
                th:action="@{/recordatorios}"
                method="post"
                id="createForm"
        >

            <div class="form-grid">

                <div class="form-group full">

                    <label>
                        Título
                    </label>

                    <input
                            type="text"
                            name="titulo"
                            class="form-input"
                            required
                    >

                </div>

                <div class="form-group full">

                    <label>
                        Mensaje
                    </label>

                    <textarea
                            name="mensaje"
                            class="form-textarea"
                    ></textarea>

                </div>

                <div class="form-group">

                    <label>
                        Fecha límite
                    </label>

                    <input
                            type="datetime-local"
                            name="fechaLimite"
                            class="form-input"
                            required
                    >

                </div>

                <div class="form-group">

                    <label>
                        Recordar antes (min)
                    </label>

                    <input
                            type="number"
                            name="recordarAntesMinutos"
                            class="form-input"
                    >

                </div>

                <div class="form-group">

                    <label>
                        Prioridad
                    </label>

                    <select
                            name="prioridad"
                            class="form-select"
                    >

                        <option value="ALTA">
                            Alta
                        </option>

                        <option value="MEDIA">
                            Media
                        </option>

                        <option value="BAJA">
                            Baja
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>
                        Categoría
                    </label>

                    <select
                            name="categoria"
                            class="form-select"
                    >
                        <option value="SALUD">
                            Medicamento
                        </option>

                        <option value="HOGAR">
                            Hogar
                        </option>

                        <option value="TRABAJO">
                            Trabajo
                        </option>

                        <option value="ESTUDIO">
                            Estudio
                        </option>

                        <option value="PERSONAL">
                            Personal
                        </option>

                        <option value="FINANZAS">
                            Finanzas
                        </option>

                        <option value="OTRO">
                            Otro
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>
                        Color
                    </label>

                    <input
                            type="color"
                            name="color"
                            value="#6366f1"
                            class="form-input"
                    >

                </div>

                <div class="form-group checkbox-full">

                    <div class="checkbox-group">

                        <!-- Enviar explicitamente false cuando no esté marcado -->
                        <input type="hidden" name="repetitivo" value="false">
                        <input
                                type="checkbox"
                                name="repetitivo"
                                value="true"
                                id="repetitivoCreate"
                        >

                        <label>
                            Repetitivo
                        </label>

                    </div>

                </div>

                <div
                        class="form-group"
                        id="intervaloDiasContainer"
                >

                    <label>
                        Intervalo días
                    </label>

                    <input
                            type="number"
                            name="intervaloDias"
                            class="form-input"
                    >

                </div>

            </div>

            <div class="modal-actions">

                <button
                        type="button"
                        class="cancel-btn"
                        onclick="attemptCloseModal('createModal')"
                >
                    Cancelar
                </button>

                <button
                        type="submit"
                        class="save-btn"
                >
                    Guardar
                </button>

            </div>

        </form>

    </div>

</div>

<!-- MODAL EDITAR -->

<div
        class="modal-overlay"
        id="editModal"
>

    <div class="modal">

        <div class="modal-header">

            <h2>
                Editar recordatorio
            </h2>

            <button
                    class="close-btn"
                    onclick="attemptCloseModal('editModal')"
            >
                ✖
            </button>

        </div>

        <form
                method="post"
                id="editForm"
        >

            <div class="form-grid">

                <div class="form-group full">

                    <label>
                        Título
                    </label>

                    <input
                            type="text"
                            id="editTitulo"
                            name="titulo"
                            class="form-input"
                            required
                    >

                </div>

                <div class="form-group full">

                    <label>
                        Mensaje
                    </label>

                    <textarea
                            id="editMensaje"
                            name="mensaje"
                            class="form-textarea"
                    ></textarea>

                </div>

                <div class="form-group">

                    <label>
                        Fecha límite
                    </label>

                    <input
                            type="datetime-local"
                            id="editFechaLimite"
                            name="fechaLimite"
                            class="form-input"
                            required
                    >

                </div>

                <div class="form-group">

                    <label>
                        Recordar antes (min)
                    </label>

                    <input
                            type="number"
                            id="editRecordarAntes"
                            name="recordarAntesMinutos"
                            class="form-input"
                    >

                </div>

                <div class="form-group">

                    <label>
                        Prioridad
                    </label>

                    <select
                            id="editPrioridad"
                            name="prioridad"
                            class="form-select"
                    >

                        <option value="ALTA">
                            Alta
                        </option>

                        <option value="MEDIA">
                            Media
                        </option>

                        <option value="BAJA">
                            Baja
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>
                        Categoría
                    </label>

                    <select
                            id="editCategoria"
                            name="categoria"
                            class="form-select"
                    >

                        <option value="SALUD">
                            Medicamento
                        </option>

                        <option value="HOGAR">
                            Hogar
                        </option>

                        <option value="TRABAJO">
                            Trabajo
                        </option>

                        <option value="ESTUDIO">
                            Estudio
                        </option>

                        <option value="PERSONAL">
                            Personal
                        </option>

                        <option value="FINANZAS">
                            Finanzas
                        </option>

                        <option value="OTRO">
                            Otro
                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label>
                        Color
                    </label>

                    <input
                            type="color"
                            id="editColor"
                            name="color"
                            class="form-input"
                    >

                </div>

                <div class="form-group checkbox-full">

                    <div class="checkbox-group">

                        <!-- Enviar explicitamente false cuando no esté marcado -->
                        <input type="hidden" name="repetitivo" value="false">
                        <input
                                type="checkbox"
                                id="editRepetitivo"
                                name="repetitivo"
                                value="true"
                        >

                        <label>
                            Repetitivo
                        </label>

                    </div>

                </div>

                <div
                        class="form-group hidden"
                        id="editIntervaloDiasContainer"
                >

                    <label>
                        Intervalo días
                    </label>

                    <input
                            type="number"
                            id="editIntervaloDias"
                            name="intervaloDias"
                            class="form-input"
                    >

                </div>

            </div>

            <div class="modal-actions">

                <button
                        type="button"
                        class="cancel-btn"
                        onclick="attemptCloseModal('editModal')"
                >
                    Cancelar
                </button>

                <button
                        type="submit"
                        class="save-btn"
                >
                    Guardar cambios
                </button>

            </div>

        </form>

    </div>

</div>

<script
        th:src="@{/js/dashboard/layout.js}"
></script>

<script
        th:src="@{/js/dashboard/recordatorios.js}"
></script>

</body>
</html>
