<!DOCTYPE html>
<html
        lang="es"
        xmlns:th="http://www.thymeleaf.org"
>
<head>

    <meta charset="UTF-8">

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>Asistente IA</title>

    <link
            rel="stylesheet"
            th:href="@{/css/dashboard/layout.css}"
    >

    <link
            rel="stylesheet"
            th:href="@{/css/ia/asistente-ia.css}"
    >

    <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
            rel="stylesheet"
    >

</head>

<body>

<div class="dashboard-layout">

    <!-- SIDEBAR -->

    <div
            th:replace="~{fragments/sidebar :: sidebar('ia')}"
    ></div>

    <!-- MAIN -->

    <main class="main-content">

        <!-- TOPBAR -->

        <div
                th:replace="~{fragments/topbar :: topbar(
                    'Asistente Inteligente',
                    'Organiza automaticamente tus tareas usando IA'
                )}"
        ></div>

        <!-- CARD IA -->

        <div class="ia-card">

            <div class="ia-header">

                <div class="ia-icon">
                    🤖
                </div>

                <div>

                    <h3>
                        Asistente inteligente
                    </h3>

                    <p>
                        Elige una acción y describe lo que necesitas
                    </p>

                </div>

            </div>

            <div class="ia-form-row">
                <div class="ia-field">
                    <label for="iaAccion">
                        Accion
                    </label>
                    <select
                            id="iaAccion"
                            class="ia-select"
                    >
                        <option value="crear-recordatorios" selected>
                            Crear recordatorios
                        </option>
                        <option value="chat">Chat</option>
                        <option value="plan-diario">Plan diario</option>
                        <option value="plan-semanal">Plan semanal</option>
                        <option value="priorizar">Priorizar tareas</option>
                        <option value="tareas-nl">Tareas por lenguaje natural</option>
                    </select>
                </div>
                <div class="ia-field">
                    <label for="preferenciasIA">
                        Preferencias (opcional)
                    </label>
                    <input
                            id="preferenciasIA"
                            class="ia-input"
                            type="text"
                            placeholder="Ej: prefiero tareas cortas en la manana"
                    >
                </div>
            </div>

            <textarea
                    id="mensajeIA"
                    class="ia-textarea"
                    placeholder="Ejemplo:
Tengo examen mañana,
debo estudiar cálculo,
comprar medicamentos,
hacer ejercicio
y organizar mi cuarto."
            ></textarea>

            <button
                    id="btnIA"
                    class="ia-button"
            >

                <i class="fa-solid fa-wand-magic-sparkles"></i>

                Analizar y crear tareas

            </button>

        </div>

        <!-- RESPUESTA -->

        <div
                id="respuestaIA"
                class="ia-response-container"
        ></div>

    </main>

</div>

<script th:src="@{/js/dashboard/layout.js}"></script>
<script
        th:src="@{/js/ia/asistente-ia.js}"
></script>

</body>
</html>
