<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Virtual</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',sans-serif;
        }

        :root{
            --bg:#f5f7fb;
            --card:#ffffff;
            --text:#1e293b;
            --primary:#4f46e5;
            --secondary:#6366f1;
            --border:#e2e8f0;
            --shadow:0 10px 30px rgba(0,0,0,.08);
        }

        [data-theme="dark"]{
            --bg:#0f172a;
            --card:#1e293b;
            --text:#f8fafc;
            --primary:#818cf8;
            --secondary:#6366f1;
            --border:#334155;
            --shadow:0 10px 30px rgba(0,0,0,.4);
        }

        body{
            background:var(--bg);
            color:var(--text);
            transition:.3s;
        }

        header{
            padding:20px 8%;
            display:flex;
            justify-content:space-between;
            align-items:center;
            position:sticky;
            top:0;
            background:rgba(255,255,255,.6);
            backdrop-filter:blur(10px);
        }

        .logo{
            font-size:1.5rem;
            font-weight:700;
            color:var(--primary);
        }

        nav{
            display:flex;
            gap:15px;
            align-items:center;
        }

        .btn{
            padding:12px 22px;
            border:none;
            border-radius:12px;
            cursor:pointer;
            font-weight:600;
            transition:.3s;
            text-decoration:none;
        }

        .btn-primary{
            background:var(--primary);
            color:white;
        }

        .btn-primary:hover{
            transform:translateY(-2px);
        }

        .theme-btn{
            width:45px;
            height:45px;
            border-radius:50%;
            border:none;
            cursor:pointer;
            background:var(--card);
            box-shadow:var(--shadow);
            color:var(--text);
            font-size:18px;
        }

        .hero{
            min-height:90vh;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            padding:40px 8%;
        }

        .hero-content{
            max-width:750px;
            animation:fadeIn 1s ease;
        }

        .hero h1{
            font-size:4rem;
            margin-bottom:20px;
        }

        .hero p{
            font-size:1.2rem;
            line-height:1.7;
            margin-bottom:30px;
            opacity:.8;
        }

        .hero-buttons{
            display:flex;
            justify-content:center;
            gap:15px;
            flex-wrap:wrap;
        }

        .glass{
            background:var(--card);
            border:1px solid var(--border);
            box-shadow:var(--shadow);
            border-radius:24px;
            padding:50px;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(30px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        @media(max-width:768px){
            .hero h1{
                font-size:2.5rem;
            }

            header{
                padding:20px;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">Agenda Virtual</div>

    <nav>
        <a href="/login" class="btn btn-primary">Iniciar Sesión</a>
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    </nav>
</header>

<section class="hero">
    <div class="hero-content glass">
        <h1>Organiza tu vida de manera inteligente</h1>

        <p>
            Administra contactos, tareas y eventos desde una plataforma moderna,
            rápida y totalmente responsive.
        </p>

        <div class="hero-buttons">
            <a href="/register" class="btn btn-primary">Crear Cuenta</a>
            <a href="/login" class="btn btn-primary">Ingresar</a>
        </div>
    </div>
</section>

<script>
    function toggleTheme(){
        const html=document.documentElement;
        const current=html.getAttribute("data-theme");

        if(current==="dark"){
            html.setAttribute("data-theme","light");
            localStorage.setItem("theme","light");
        }else{
            html.setAttribute("data-theme","dark");
            localStorage.setItem("theme","dark");
        }
    }

    const savedTheme=localStorage.getItem("theme");
    if(savedTheme){
        document.documentElement.setAttribute("data-theme",savedTheme);
    }
</script>

</body>
</html>
