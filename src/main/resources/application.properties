# ======================================
# APP
# ======================================
spring.application.name=AgendaVirtual
server.port=${APP_PORT:4444}

# ======================================
# DATABASE
# ======================================

## DATABASE (use environment variables; reasonable defaults for local development)
# By default the app will connect to a local Postgres at localhost:5432/agenda_virtual.
# For CI/CD or cloud deployments set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME and SPRING_DATASOURCE_PASSWORD
# Provide defaults so Spring can start when env vars are not set.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/agenda_virtual}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ADMINISTRADOR}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ======================================
# JPA
# ======================================

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ======================================
# HIKARI
# ======================================

spring.datasource.hikari.maximum-pool-size=10

spring.datasource.hikari.minimum-idle=5

spring.datasource.hikari.connection-timeout=20000

spring.datasource.hikari.idle-timeout=300000

# ======================================
# THYMELEAF
# ======================================

spring.thymeleaf.cache=false

# ======================================
# SECURITY
# ======================================

spring.web.error.include-message=never
logging.level.org.springframework.security=INFO

# ======================================
# SECURITY
# ======================================

# AI provider
# Configure your real token in the environment (do NOT commit real tokens to VCS)
# Default configured value may point to a cloud provider (Cohere). To use a local
# Ollama instance set the environment variable `AI_PROVIDER_URL` to the Ollama
# generate endpoint (por ejemplo: http://localhost:11434/api/generate) and remove
# any `AI_PROVIDER_KEY` (Ollama no necesita token localmente).
#
# Ejemplos (PowerShell):
# setx AI_PROVIDER_URL "http://localhost:11434/api/generate"
# setx AI_PROVIDER_KEY ""   <-- quitar el token si usa Ollama local
#
# Si desea usar Cohere en la nube, configure:
# setx AI_PROVIDER_URL "https://api.cohere.ai/v1/generate"
# setx AI_PROVIDER_KEY "cohere_xxx"
ai.provider.url=${AI_PROVIDER_URL:https://api.cohere.ai/v1/generate}
ai.provider.key=${AI_PROVIDER_KEY:}
