# ======================================
# APP
# ======================================
spring.application.name=AgendaVirtual
server.port=${APP_PORT:4444}

# ======================================
# DATABASE
# ======================================

## DATABASE (use environment variables; reasonable defaults for local development)
# By default the app will connect to a local Postgres at localhost:5432/agenda_virtual.
# For CI/CD or cloud deployments set SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME and SPRING_DATASOURCE_PASSWORD
# Provide defaults so Spring can start when env vars are not set.
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ======================================
# JPA
# ======================================

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ======================================
# HIKARI
# ======================================

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ======================================
# THYMELEAF
# ======================================

spring.thymeleaf.cache=false

# ======================================
# SECURITY
# ======================================

spring.web.error.include-message=never
logging.level.org.springframework.security=INFO

# ======================================
# SECURITY
# ======================================

# AI provider (solo Ollama local)
# Configura la URL base de Ollama (por defecto: http://localhost:11434)
# Ejemplo (PowerShell):
# setx AI_PROVIDER_URL "http://localhost:11434"
# setx AI_PROVIDER_MODEL "mistral"
ai.provider.url=${AI_PROVIDER_URL:http://localhost:11434}

# IA config
ai.provider.model=${AI_PROVIDER_MODEL:mistral}
ai.memory.limit=${AI_MEMORY_LIMIT:12}
ai.context.city=${AI_CONTEXT_CITY:Bogota}
ai.context.timezone=${AI_CONTEXT_TIMEZONE:America/Bogota}
ai.enabled=${AI_ENABLED:true}

# ======================================
# EMAIL (SMTP)
# ======================================
app.mail.enabled=${MAIL_ENABLED:true}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS:true}
app.mail.from=${MAIL_FROM:}
