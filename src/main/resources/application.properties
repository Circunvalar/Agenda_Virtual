# ======================================
# APP
# ======================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:agenda_virtual}
spring.datasource.username=${DB_USER:ADMINISTRADOR}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=${APP_PORT:4444}

# ======================================
# DATABASE
# ======================================

spring.jpa.open-in-view=false

# ======================================
# JPA
# ======================================

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ======================================
# HIKARI
# ======================================

spring.datasource.hikari.maximum-pool-size=10

spring.datasource.hikari.minimum-idle=5

spring.datasource.hikari.connection-timeout=20000

spring.datasource.hikari.idle-timeout=300000

# ======================================
# THYMELEAF
# ======================================

spring.thymeleaf.cache=false

# ======================================
# SECURITY
# ======================================

spring.web.error.include-message=never
logging.level.org.springframework.security=INFO